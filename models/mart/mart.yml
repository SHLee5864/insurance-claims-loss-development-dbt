version: 2

models:

  - name: mart_paid_triangle
    description: "Cumulative paid loss triangle by Accident Year × Development Month."
    columns:
      - name: accident_year
        tests:
          - not_null
      - name: dev_month
        tests:
          - greater_than_or_equal_to_zero
      - name: paid_to_date
        tests:
          - greater_than_or_equal_to_zero

  - name: mart_incurred_triangle
    description: "Incurred loss triangle based on Paid + Reserve amounts."
    columns:
      - name: accident_year
        tests:
          - not_null
      - name: incurred_amount
        tests:
          - greater_than_or_equal_to_zero
      - name: reserve_amount
        tests:
          - greater_than_or_equal_to_zero

  - name: mart_ldf
    description: "Loss Development Factors (LDF) and cumulative LDF calculations."
    columns:
      - name: ldf
        tests:
          - greater_than_or_equal_to_zero
      - name: cumulative_ldf
        tests:
          - greater_than_or_equal_to_zero

  - name: mart_ultimate_loss
    description: "Ultimate Loss estimation by Accident Year using cumulative LDFs."
    columns:
      - name: accident_year
        tests:
          - unique
          - not_null
      - name: ultimate_loss
        tests:
          - greater_than_or_equal_to_zero

  - name: mart_loss_ratio_by_ay
    description: "Loss Ratio by Accident Year (Ultimate Loss / Earned Premium)."
    columns:
      - name: accident_year
        tests:
          - unique
          - not_null
      - name: loss_ratio
        tests:
          - greater_than_or_equal_to_zero

  - name: mart_exposure_alignment
    description: "Exposure and Ultimate Loss alignment by Accident Year × Region."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: ['accident_year', 'region']
    columns:
      - name: loss_ratio
        tests:
          - greater_than_or_equal_to_zero
