version: 2

sources:
  - name: raw
    catalog: workspace
    schema: insurance_dbt
    tables:
      - name: raw_policy
        description: "Synthetic policy-level data"
        columns:
          - name: policy_number
            tests: [not_null, unique]

      - name: raw_exposure
        description: "Monthly exposure per policy"
        columns:
          - name: policy_number
            tests: [not_null]
          - name: date_month
            tests: [not_null]
        test:
          - unique:
              column_name: "concat(policy_number, '-', date_month)"

      - name: raw_claims
        description: "Claim-level data"
        columns:
          - name: claim_id
            tests: [not_null, unique]
          - name: policy_number
            tests: [not_null]
          - name: policy_number
            tests:
              - relationships:
                  arguments:
                    to: ref('stg_policy')
                    field: policy_number

      - name: raw_payments
        description: "Payment transactions"
        columns:
          - name: payment_id
            tests: [not_null, unique]
          - name: claim_id
            tests: 
              - not_null
              - relationships:
                  arguments:
                    to: ref('stg_claims')
                    field: claim_id
      - name: raw_reserve_snapshot
        description: "Monthly reserve snapshot per claim"
        columns:
          - name: claim_id
            tests: [not_null]
          - name: valuation_date
            tests: [not_null]
        test:
          - unique:
              column_name: "concat(claim_id, '-', valuation_date)"

      - name: calendar
        description: "Monthly calendar with COVID, weather, travel, inflation signals"
        columns:
          - name: date_month
            tests: [not_null, unique]

      - name: raw_transactions
        description: "Claim lifecycle event log (opened, investigation, approved, closed, reopened)"
        columns:
          - name: transaction_id
            tests: [not_null, unique]
          - name: claim_id
            tests:
              - not_null
          - name: event_type
          - name: event_timestamp